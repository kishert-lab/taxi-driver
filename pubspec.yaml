name: taxi_driver_app
description: Taxi driver mobile application for the taxi platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  equatable: ^2.0.8
  firebase_messaging: ^16.2.1
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.2.0
  geolocator: ^14.0.2
  json_annotation: ^4.11.0
  path_provider: ^2.1.5
  retrofit: ^4.9.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  permission_handler: ^12.0.1
  intl: ^0.20.2
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  flutter_lints: ^5.0.0
  json_serializable: ^6.13.2
  retrofit_generator: ^10.2.6

flutter:
  uses-material-design: true
